<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Half a Million Dollar Homepage</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .checkout-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: left;
            max-width: 400px;
            width: 100%;
        }
        .checkout-container h2 {
            text-align: center;
        }
        .checkout-container label, .checkout-container input {
            width: 100%;
            margin-top: 10px;
        }
        .checkout-container button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .checkout-container button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h2>Checkout</h2>
        <p>You are purchasing pixel #<span id="pixel-id"></span> for $1.</p>
        <label for="card-number">Card Number:</label>
        <input type="text" id="card-number" placeholder="1234 5678 9012 3456">
        
        <label for="expiry-date">Expiry Date:</label>
        <input type="text" id="expiry-date" placeholder="MM/YY">
        
        <label for="cvv">CVV:</label>
        <input type="text" id="cvv" placeholder="123">
        
        <button onclick="processPayment()">Pay $1</button>
    </div>
    
    <script>
        function getQueryParam(param) {
            let urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        document.getElementById('pixel-id').textContent = getQueryParam('pixel') || 'Unknown';
        
        function processPayment() {
            alert('Payment successful! Your pixel has been purchased.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
